services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vlang-postgres
    environment:
      POSTGRES_USER: vlang
      POSTGRES_PASSWORD: vlang
      POSTGRES_DB: vlang
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vlang -d vlang"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-server:
    image: langfuse/langfuse:2
    container_name: vlang-langfuse
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vlang:vlang@postgres:5432/vlang
      NEXTAUTH_SECRET: change-me-in-production
      SALT: change-me-in-production
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"

volumes:
  postgres_data:
